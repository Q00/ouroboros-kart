<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ouroboros Kart</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #101418;
      }

      body {
        position: fixed;
        inset: 0;
      }

      #game-canvas {
        position: absolute;
        inset: 0;
        display: block;
        width: 100vw;
        height: 100vh;
        z-index: 0;
      }

      #hud-canvas {
        position: absolute;
        inset: 0;
        display: block;
        width: 100vw;
        height: 100vh;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>
    <canvas id="hud-canvas"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
